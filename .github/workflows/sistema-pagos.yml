name: Sistema de Asistencia y Pagos

on:
  schedule:
    # Se ejecuta automáticamente todos los días a la 1:00 AM UTC (8:00 PM Perú)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      script_to_run:
        description: '¿Qué reportes deseas generar y enviar?'
        required: true
        default: 'ambos'
        type: choice
        options:
          - ambos
          - solo_colaboradores
          - solo_proyectos

jobs:
  ejecutar-reportes:
    runs-on: ubuntu-latest
    env:
      TZ: 'America/Lima' # 🇵🇪 Fuerza a todo el servidor a pensar que está en Perú
    steps:
      - name: 📥 Clonar el repositorio
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Instalar Librerías
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl python-dotenv google-auth google-api-python-client

      - name: 📩 Ejecutar Sistema de Colaboradores
        if: github.event.inputs.script_to_run == 'ambos' || github.event.inputs.script_to_run == 'solo_colaboradores' || github.event_name == 'schedule'
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_SERVICE_ACCOUNT_FILE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python sistema_asistencia.py

      - name: 🚀 Ejecutar Sistema de Proyectos
        if: github.event.inputs.script_to_run == 'ambos' || github.event.inputs.script_to_run == 'solo_proyectos' || github.event_name == 'schedule'
        env:
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON || secrets.GOOGLE_SERVICE_ACCOUNT_FILE }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python asistencia_proy.py

      - name: 📁 Guardar Copia de los Excel Generados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Archivos-Excel-Generados
          path: Reportes_Asistencia/
          retention-days: 30
